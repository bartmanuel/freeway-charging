name: Build Android package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # Pre-configure JDK + SDK paths so bubblewrap skips all installation prompts
      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"/usr/local/lib/android/sdk/"}' \
            "${{ steps.setup-java.outputs.path }}" > ~/.bubblewrap/config.json

      # Generate Android project files from twa/twa-manifest.json (no interactive prompts)
      - name: Generate TWA project
        run: node scripts/generate-android-project.mjs

      # Decode keystore from secret into the project directory
      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > twa/letsjustdrive.keystore

      # Build APK + AAB directly via Gradle (bypasses all bubblewrap interactive prompts).
      # Version info is already baked into build.gradle by generate-android-project.mjs.
      # Signing credentials are passed as Gradle properties.
      - name: Build APK + AAB
        working-directory: twa
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=letsjustdrive.keystore \
            -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias=letsjustdrive \
            -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=letsjustdrive.keystore \
            -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias=letsjustdrive \
            -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LetsJustDrive-Android
          path: |
            twa/app/build/outputs/apk/release/*.apk
            twa/app/build/outputs/bundle/release/*.aab
          retention-days: 30
