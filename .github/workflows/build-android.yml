name: Build Android package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # Pre-configure JDK + SDK paths so bubblewrap skips all installation prompts
      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"/usr/local/lib/android/sdk/"}' \
            "${{ steps.setup-java.outputs.path }}" > ~/.bubblewrap/config.json

      # Generate Android project files from twa/twa-manifest.json (no interactive prompts)
      - name: Generate TWA project
        run: node scripts/generate-android-project.mjs

      # Decode keystore from secret into the project directory
      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > twa/letsjustdrive.keystore

      # Pipe answers to all bubblewrap build prompts:
      #   1. "regenerate project?" (no checksum file present) → y
      #   2. "versionName" → 1.0.0
      #   3. "versionCode" → 1
      # Keystore passwords are supplied via env vars (no prompt needed).
      - name: Build APK + AAB
        working-directory: twa
        run: printf 'y\n1.0.0\n1\n' | bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LetsJustDrive-Android
          path: |
            twa/*.apk
            twa/*.aab
          retention-days: 30
