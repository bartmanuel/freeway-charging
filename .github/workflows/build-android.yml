name: Build Android package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap JDK + SDK paths
        run: |
          mkdir -p ~/.bubblewrap
          echo '{
            "jdkPath": "${{ steps.setup-java.outputs.path }}",
            "androidSdkPath": "/usr/local/lib/android/sdk/"
          }' > ~/.bubblewrap/config.json

      - name: Restore keystore from secret
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      - name: Build APK + AAB
        run: bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LetsJustDrive-Android
          path: |
            app-release-bundle.aab
            app-release-signed.apk
          retention-days: 30
